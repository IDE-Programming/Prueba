<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="Calculo.css" rel="stylesheet">
    <title>Preuniversitario Alexander Graham Bell</title>
</head>
<body>

    <div class="division">
        <div>
            <form class="form">
                <p class="title">Calcular la nota de grado </p>
                <label>
                    <input id="N1" autocomplete="off"  required="" placeholder="" type="number" class="input">
                    <span>Nota de 8vo</span>
                </label>
                <label>
                    <input id="N2" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de 9no</span>
                </label>   
                <label>
                    <input id="N3" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de 10mo</span>
                </label>   
                <label>
                    <input id="N4" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de 1ero</span>
                </label>   
                <label>
                    <input id="N5" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de 2do</span>
                </label>   
                <label>
                    <input id="N6" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de 3ero</span>
                </label>   
                <label>
                    <input id="N7" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota de participación estudiantil</span>
                </label>   
                <label>
                    <input id="N8" autocomplete="off" required="" placeholder="" type="number" class="input">
                    <span>Nota del examen de grado</span>
                </label>   
                <p id="NotaColegio" class="signin"></p>
                <button id="Calcular" class="submit">Calcular</button>
            </form>
        </div>
    
        <div>
            <form class="form">
                <p class="title">Calcular la nota de grado </p>
                <label>
                    <input id="N9" required="" placeholder="" type="number" class="input">
                    <span>Nota del Colegio</span>
                </label>
                <label>
                    <input id="N10" required="" placeholder="" type="number" class="input">
                    <span>Nota de Postulacion</span>
                </label> 
                <label>
                    <input id="N11" required="" placeholder="" type="number" class="input">
                    <span>Porcentaje del colegio</span>
                </label>   
                <label>
                    <input id="N12" required="" placeholder="" type="number" class="input">
                    <span>Porcentaje de la universidad</span>
                </label>                                
                <p id="NotaPostular" class="signin"></p>
                <button id="Calcular1" class="submit">Calcular</button>
            </form>
        </div>
       
    </div>

   
</body>
</html>


<script type="module">


    document.getElementById("Calcular").onclick = function(e){
        event.preventDefault();

        var N1 = document.getElementById("N1").value;
        var N2 = document.getElementById("N2").value;
        var N3 = document.getElementById("N3").value;
        var N4 = document.getElementById("N4").value;
        var N5 = document.getElementById("N5").value;
        var N6 = document.getElementById("N6").value;
        var N7 = document.getElementById("N7").value;
        var N8 = document.getElementById("N8").value;

        if(N1 == "" || N2 == "" || N3 == "" || N4 == "" || N5 == "" || N6 == "" || N7 == "" || N8 == "" ){
            return;
        }



        var Valor1 = ((parseFloat(N1)+parseFloat(N2)+parseFloat(N3))/3) * (30/100);

        var Valor2 = ((parseFloat(N4)+parseFloat(N5)+parseFloat(N6))/3) * (40/100);

        var Valor3 = (N7) * (10/100);

        var Valor4 = (N8) * (20/100);

        var SumaPromedio = Valor1 + Valor2 + Valor3 + Valor4;
        
        document.getElementById("NotaColegio").innerHTML = "Su nota del colegio es: "+(SumaPromedio).toFixed(2); 
        

    }


    document.getElementById("Calcular1").onclick = function(e){
        event.preventDefault();

        var N9 = document.getElementById("N9").value;
        var N10 = document.getElementById("N10").value;
        var N11 = document.getElementById("N11").value;
        var N12 = document.getElementById("N12").value;
       

        if(N9 == "" || N10 == "" || N11 == ""  || N12 == ""){
            return;
        }



        var Valor = (N9 * 100) * (N11/100);
        var Valor1 = Valor - N10;
        var Valor2 = Valor1 * (100/N12); 
        
        document.getElementById("NotaPostular").innerHTML = "Valor al postular: "+(Valor2).toFixed(2); 
        

    }




</script>
